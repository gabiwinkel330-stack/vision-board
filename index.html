<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vision Board Anual — Gabriele Winkel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream: #F7F2EC;
  --cream2: #EFE8DF;
  --cream3: #E6DDD2;
  --terra: #C4622D;
  --warm: #D4784A;
  --peach: #F0A07A;
  --sky: #C8DCE8;
  --sky-pale: #E8F2F7;
  --text: #3A2A1E;
  --text-muted: #7A6155;
  --text-dim: #A8958A;
  --white: #FFFFFF;
  --shadow-sm: 0 1px 2px rgba(58,42,30,0.04);
  --shadow: 0 1px 3px rgba(58,42,30,0.06), 0 1px 2px rgba(58,42,30,0.04);
  --shadow-md: 0 6px 18px rgba(58,42,30,0.06), 0 1px 3px rgba(58,42,30,0.04);
  --shadow-lg: 0 12px 32px rgba(58,42,30,0.08), 0 2px 6px rgba(58,42,30,0.04);
  --radius-sm: 4px;
  --radius: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --t: 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
  --sans: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
}

html, body {
  background: var(--cream);
  color: var(--text);
  font-family: var(--sans);
  font-weight: 300;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  letter-spacing: 0.005em;
}

.container {
  max-width: 1180px;
  margin: 0 auto;
  padding: 60px 40px 100px;
}

/* ============= HERO ============= */
.hero {
  position: relative;
  text-align: center;
  padding: 80px 40px 70px;
  margin-bottom: 64px;
  border-radius: var(--radius-xl);
  background:
    radial-gradient(ellipse at 80% 20%, rgba(168,196,212,0.35) 0%, transparent 55%),
    radial-gradient(ellipse at 20% 80%, rgba(240,160,122,0.30) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 50%, rgba(232,196,168,0.20) 0%, transparent 70%),
    var(--cream);
  overflow: hidden;
}
.hero-label {
  font-size: 11px;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--terra);
  font-weight: 400;
  margin-bottom: 20px;
}
.hero-title {
  font-size: clamp(40px, 5vw, 60px);
  font-weight: 200;
  letter-spacing: 0.04em;
  line-height: 1.1;
  text-transform: uppercase;
  color: var(--text);
  margin-bottom: 14px;
}
.hero-title em { font-style: normal; font-weight: 300; color: var(--terra); }
.hero-year {
  font-size: 14px;
  font-weight: 300;
  letter-spacing: 0.18em;
  color: var(--text-muted);
  text-transform: uppercase;
  outline: none;
  display: inline-block;
  padding: 6px 18px;
  border-radius: 100px;
  transition: background var(--t);
}
.hero-year:hover, .hero-year:focus { background: rgba(255,255,255,0.6); }

/* ============= SECTION HEADER ============= */
.section-title {
  font-size: 11px;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--terra);
  font-weight: 400;
  margin-bottom: 28px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.section-title::after {
  content: '';
  height: 1px;
  flex: 1;
  background: var(--peach);
  opacity: 0.4;
}

/* ============= INSPIRATION ============= */
.inspiration {
  display: grid;
  grid-template-columns: 1.5fr 1fr;
  gap: 20px;
  margin-bottom: 64px;
}
.image-board, .affirmations {
  background: var(--white);
  border: 1px solid rgba(196,98,45,0.10);
  border-radius: var(--radius);
  padding: 28px;
  display: flex;
  flex-direction: column;
}
.panel-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 22px;
  padding-bottom: 16px;
  border-bottom: 1px solid rgba(196,98,45,0.10);
  gap: 16px;
}
.panel-header h3 {
  font-size: 11px;
  font-weight: 400;
  color: var(--terra);
  text-transform: uppercase;
  letter-spacing: 0.25em;
  outline: none;
  padding: 2px 4px;
  margin-left: -4px;
  border-radius: 3px;
  transition: background var(--t);
}
.panel-header h3[contenteditable]:hover, .panel-header h3[contenteditable]:focus {
  background: var(--cream);
}
.upload-btn {
  background: transparent;
  color: var(--terra);
  border: 1px solid var(--peach);
  padding: 7px 16px;
  border-radius: 100px;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  font-family: var(--sans);
  transition: all var(--t);
  white-space: nowrap;
}
.upload-btn:hover {
  background: var(--terra);
  color: var(--cream);
  border-color: var(--terra);
}

.image-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 10px;
  flex: 1;
  min-height: 240px;
}
.image-grid:empty::before {
  content: 'Adicione imagens que representem sua visão para o ano';
  grid-column: 1/-1;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: var(--text-dim);
  font-size: 13px;
  font-weight: 300;
  border: 1px dashed var(--cream3);
  border-radius: var(--radius);
  padding: 40px 20px;
}
.image-tile {
  position: relative;
  aspect-ratio: 1;
  border-radius: var(--radius-sm);
  overflow: hidden;
  background: var(--cream2);
  animation: fadeIn 0.45s ease;
}
.image-tile img { width: 100%; height: 100%; object-fit: cover; display: block; }
.image-tile .remove {
  position: absolute;
  top: 6px;
  right: 6px;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: rgba(58,42,30,0.75);
  color: var(--cream);
  border: none;
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity var(--t);
}
.image-tile:hover .remove { opacity: 1; }

.affirmation-textarea {
  flex: 1;
  width: 100%;
  border: none;
  resize: none;
  background: transparent;
  font-family: var(--sans);
  font-weight: 300;
  font-size: 15px;
  line-height: 1.85;
  color: var(--text);
  outline: none;
  min-height: 240px;
  letter-spacing: 0.005em;
}
.affirmation-textarea::placeholder { color: var(--text-dim); font-weight: 300; }

/* ============= AREAS GRID (Home) ============= */
.areas-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 18px;
  margin-bottom: 60px;
}
.area-card {
  background: var(--white);
  border: 1px solid rgba(196,98,45,0.10);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: all var(--t);
  display: flex;
  flex-direction: column;
  text-align: left;
  font-family: var(--sans);
}
.area-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow-md);
  border-color: rgba(196,98,45,0.22);
}
.area-cover {
  position: relative;
  aspect-ratio: 16 / 11;
  background: linear-gradient(160deg, var(--sky-pale) 0%, var(--cream) 50%, var(--cream2) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  border-bottom: 1px solid rgba(196,98,45,0.08);
}
.area-cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.area-cover-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  color: var(--text-dim);
}
.area-cover-icon {
  font-size: 28px;
  font-weight: 200;
  color: var(--terra);
  opacity: 0.7;
}
.area-cover-text {
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.24em;
  text-transform: uppercase;
}
.cover-actions {
  position: absolute;
  top: 10px;
  right: 10px;
  display: flex;
  gap: 6px;
  opacity: 0;
  transition: opacity var(--t);
}
.area-card:hover .cover-actions { opacity: 1; }
.cover-btn {
  background: rgba(58,42,30,0.78);
  color: var(--cream);
  border: none;
  padding: 6px 12px;
  border-radius: 100px;
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  cursor: pointer;
  font-family: var(--sans);
  transition: background var(--t);
  backdrop-filter: blur(6px);
}
.cover-btn:hover { background: var(--terra); }

.area-body {
  padding: 22px 24px 24px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  flex: 1;
}
.area-tag {
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--terra);
  margin-bottom: 4px;
}
.area-name-display {
  font-size: 22px;
  font-weight: 200;
  letter-spacing: 0.04em;
  color: var(--text);
  text-transform: uppercase;
  line-height: 1.2;
  margin-bottom: 10px;
}
.area-arrow {
  margin-top: auto;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--terra);
  padding-top: 12px;
}
.area-arrow .arrow {
  display: inline-block;
  transition: transform var(--t);
}
.area-card:hover .area-arrow .arrow { transform: translateX(6px); }

/* ============= VIEWS ============= */
.view-home, .view-area {
  animation: fadeIn 0.5s ease;
}
.view-area { display: none; }
body.view-area-active .view-home { display: none; }
body.view-area-active .view-area { display: block; }

/* ============= AREA VIEW ============= */
.back-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 32px;
  gap: 16px;
}
.back-btn {
  background: transparent;
  border: 1px solid var(--cream3);
  color: var(--text-muted);
  padding: 8px 18px;
  border-radius: 100px;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  cursor: pointer;
  font-family: var(--sans);
  transition: all var(--t);
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.back-btn:hover {
  border-color: var(--terra);
  color: var(--terra);
}
.crumb {
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-dim);
}
.crumb strong {
  color: var(--terra);
  font-weight: 400;
}

.area-hero {
  position: relative;
  border-radius: var(--radius-xl);
  overflow: hidden;
  margin-bottom: 56px;
  background: var(--cream2);
  min-height: 340px;
  display: flex;
  align-items: flex-end;
}
.area-hero-bg {
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 80% 20%, rgba(168,196,212,0.30) 0%, transparent 55%),
    radial-gradient(ellipse at 20% 80%, rgba(240,160,122,0.25) 0%, transparent 55%),
    var(--cream);
}
.area-hero-bg img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.area-hero::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(0deg, rgba(58,42,30,0.55) 0%, rgba(58,42,30,0.0) 60%);
  pointer-events: none;
  opacity: 0;
  transition: opacity var(--t);
}
.area-hero.has-image::after { opacity: 1; }
.area-hero-actions {
  position: absolute;
  top: 18px;
  right: 18px;
  z-index: 3;
  display: flex;
  gap: 8px;
}
.area-hero-content {
  position: relative;
  z-index: 2;
  padding: 40px 44px;
  width: 100%;
}
.area-hero-tag {
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--terra);
  margin-bottom: 14px;
}
.area-hero.has-image .area-hero-tag { color: var(--peach); }
.area-hero h2 {
  font-size: clamp(34px, 4.5vw, 50px);
  font-weight: 200;
  letter-spacing: 0.04em;
  line-height: 1.1;
  text-transform: uppercase;
  color: var(--text);
  margin-bottom: 12px;
  outline: none;
  display: inline-block;
  padding: 2px 6px;
  margin-left: -6px;
  border-radius: 4px;
  transition: background var(--t);
}
.area-hero.has-image h2 { color: var(--cream); }
.area-hero h2[contenteditable]:hover, .area-hero h2[contenteditable]:focus {
  background: rgba(255,255,255,0.4);
}
.area-hero.has-image h2[contenteditable]:hover, .area-hero.has-image h2[contenteditable]:focus {
  background: rgba(0,0,0,0.25);
}
.area-hero-desc {
  font-size: 15px;
  font-weight: 300;
  line-height: 1.6;
  color: var(--text-muted);
  outline: none;
  max-width: 600px;
  padding: 4px 8px;
  margin-left: -8px;
  border-radius: 4px;
  transition: background var(--t);
  min-height: 22px;
}
.area-hero.has-image .area-hero-desc { color: rgba(247,242,236,0.9); }
.area-hero-desc:empty::before {
  content: attr(data-placeholder);
  color: var(--text-dim);
}
.area-hero.has-image .area-hero-desc:empty::before { color: rgba(247,242,236,0.7); }
.area-hero-desc:hover, .area-hero-desc:focus { background: rgba(255,255,255,0.35); }
.area-hero.has-image .area-hero-desc:hover, .area-hero.has-image .area-hero-desc:focus { background: rgba(0,0,0,0.2); }

/* ============= QUARTERS ============= */
.quarter {
  background: var(--white);
  border: 1px solid rgba(196,98,45,0.10);
  border-radius: var(--radius);
  margin-bottom: 16px;
  overflow: hidden;
  transition: box-shadow var(--t), border-color var(--t);
}
.quarter:hover { box-shadow: var(--shadow-md); }
.quarter.open { border-color: rgba(196,98,45,0.20); }

.quarter-header {
  padding: 28px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  user-select: none;
  transition: background var(--t);
  background:
    radial-gradient(ellipse at 100% 0%, rgba(168,196,212,0.18) 0%, transparent 50%),
    radial-gradient(ellipse at 0% 100%, rgba(240,160,122,0.14) 0%, transparent 50%),
    transparent;
}
.quarter-header:hover { background-color: var(--cream); }

.quarter-header-left {
  display: flex;
  align-items: baseline;
  gap: 22px;
  flex: 1;
}
.quarter-tag {
  font-size: 10px;
  font-weight: 400;
  text-transform: uppercase;
  letter-spacing: 0.28em;
  color: var(--terra);
  background: rgba(200,220,232,0.5);
  padding: 6px 14px;
  border-radius: 100px;
  white-space: nowrap;
}
.quarter-header h3 {
  font-size: 26px;
  font-weight: 200;
  letter-spacing: 0.04em;
  color: var(--text);
  text-transform: uppercase;
  flex: 1;
}
.quarter-header h3[contenteditable]:hover, .quarter-header h3[contenteditable]:focus {
  outline: none;
  background: var(--cream);
  border-radius: 4px;
}

.chevron {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--terra);
  transition: transform var(--t);
}
.quarter.open .chevron, .month.open .chevron { transform: rotate(180deg); }

.collapsible {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows 0.5s cubic-bezier(0.25,0.1,0.25,1);
}
.collapsible > .collapsible-inner { overflow: hidden; min-height: 0; }
.quarter.open > .collapsible, .month.open > .collapsible { grid-template-rows: 1fr; }

.quarter-body {
  padding: 32px;
  border-top: 1px solid rgba(196,98,45,0.10);
  background: var(--cream);
}

/* ===== Quarter Image + Meta ===== */
.tri-top {
  display: grid;
  grid-template-columns: 1fr 1.4fr;
  gap: 16px;
  margin-bottom: 32px;
}
.quarter-image {
  position: relative;
  border-radius: var(--radius);
  overflow: hidden;
  min-height: 200px;
  background: var(--white);
  border: 1px dashed var(--cream3);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all var(--t);
}
.quarter-image:hover { border-color: var(--peach); background: var(--cream2); }
.quarter-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.quarter-image.has-image { border-style: solid; border-color: rgba(196,98,45,0.10); cursor: default; }
.quarter-image-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  text-align: center;
  padding: 30px;
  color: var(--text-dim);
}
.quarter-image-placeholder .icon {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  border: 1px solid var(--peach);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: var(--terra);
  font-weight: 300;
}
.quarter-image-placeholder .text {
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  line-height: 1.5;
}
.quarter-image-actions {
  position: absolute;
  top: 10px;
  right: 10px;
  display: flex;
  gap: 6px;
  opacity: 0;
  transition: opacity var(--t);
}
.quarter-image.has-image:hover .quarter-image-actions { opacity: 1; }

.tri-meta {
  display: grid;
  grid-template-rows: 1fr 1fr;
  gap: 14px;
}
.meta-field {
  background: var(--white);
  border: 1px solid rgba(196,98,45,0.10);
  border-radius: var(--radius);
  padding: 18px 22px;
  transition: all var(--t);
}
.meta-field:focus-within { border-color: var(--peach); box-shadow: var(--shadow-sm); }
.meta-field label {
  display: block;
  font-size: 10px;
  font-weight: 400;
  text-transform: uppercase;
  letter-spacing: 0.28em;
  color: var(--terra);
  margin-bottom: 10px;
}
.meta-field [contenteditable] {
  outline: none;
  font-size: 15px;
  font-weight: 300;
  color: var(--text);
  min-height: 22px;
  line-height: 1.6;
}
.meta-field [contenteditable]:empty::before {
  content: attr(data-placeholder);
  color: var(--text-dim);
}

/* ============= MONTHS ============= */
.months-label, .weeks-label {
  font-size: 10px;
  font-weight: 400;
  text-transform: uppercase;
  letter-spacing: 0.28em;
  color: var(--terra);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.months-label::after, .weeks-label::after {
  content: '';
  height: 1px;
  flex: 1;
  background: var(--peach);
  opacity: 0.4;
}
.months-stack {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.month {
  background: var(--white);
  border: 1px solid rgba(196,98,45,0.10);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color var(--t);
}
.month.open { border-color: rgba(196,98,45,0.18); }

.month-header {
  padding: 20px 26px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  user-select: none;
  transition: background var(--t);
}
.month-header:hover { background: var(--cream); }
.month-header-left { display: flex; align-items: baseline; gap: 18px; }
.month-tag {
  font-size: 10px;
  font-weight: 400;
  text-transform: uppercase;
  letter-spacing: 0.28em;
  color: var(--text-dim);
  white-space: nowrap;
}
.month-header h4 {
  font-size: 19px;
  font-weight: 300;
  letter-spacing: 0.02em;
  color: var(--text);
}
.month-header h4[contenteditable]:hover, .month-header h4[contenteditable]:focus {
  outline: none;
  background: var(--cream2);
  border-radius: 3px;
}

.month-body {
  padding: 24px 26px 26px;
  border-top: 1px solid rgba(196,98,45,0.08);
  background: var(--cream);
}
.month-meta {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 24px;
}

/* ============= WEEKS ============= */
.weeks-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 12px;
}
.week-card {
  background: var(--white);
  border: 1px solid rgba(196,98,45,0.10);
  border-radius: var(--radius);
  padding: 20px 22px;
  transition: all var(--t);
}
.week-card:hover { border-color: var(--peach); }
.week-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  padding-bottom: 12px;
  border-bottom: 1px dashed rgba(196,98,45,0.15);
}
.week-num {
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--terra);
}
.week-progress {
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.16em;
  color: var(--text-muted);
  font-variant-numeric: tabular-nums;
  background: var(--cream);
  padding: 4px 10px;
  border-radius: 100px;
  text-transform: uppercase;
}
.week-field { margin-bottom: 12px; }
.week-field label {
  display: block;
  font-size: 9px;
  font-weight: 400;
  text-transform: uppercase;
  letter-spacing: 0.24em;
  color: var(--text-dim);
  margin-bottom: 5px;
}
.week-field [contenteditable] {
  outline: none;
  font-weight: 300;
  color: var(--text);
  line-height: 1.5;
  padding: 5px 8px;
  margin: 0 -8px;
  border-radius: 3px;
  transition: background var(--t);
  min-height: 22px;
}
.week-field [contenteditable]:hover, .week-field [contenteditable]:focus { background: var(--cream); }
.week-field [contenteditable]:empty::before {
  content: attr(data-placeholder);
  color: var(--text-dim);
}
.week-field .meta { font-size: 14px; font-weight: 400; }
.week-field .desc { font-size: 13px; color: var(--text-muted); font-weight: 300; }

/* ============= CHECKLIST ============= */
.checklist {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px dashed rgba(196,98,45,0.15);
}
.checklist-title {
  font-size: 9px;
  font-weight: 400;
  text-transform: uppercase;
  letter-spacing: 0.28em;
  color: var(--text-dim);
  margin-bottom: 10px;
}
.day-row { display: flex; align-items: center; gap: 12px; padding: 7px 0; }
.day-row:not(:last-child) { border-bottom: 1px solid rgba(230,221,210,0.5); }
.checkbox {
  width: 18px;
  height: 18px;
  min-width: 18px;
  border-radius: 50%;
  border: 1.2px solid var(--cream3);
  background: var(--white);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--t);
  position: relative;
}
.checkbox:hover { border-color: var(--terra); transform: scale(1.08); }
.checkbox.checked {
  background: var(--terra);
  border-color: var(--terra);
  animation: pop 0.32s ease;
}
.checkbox.checked::after {
  content: '';
  width: 5px;
  height: 9px;
  border-right: 1.5px solid var(--cream);
  border-bottom: 1.5px solid var(--cream);
  transform: rotate(45deg) translateY(-1px);
}
.day-name {
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.16em;
  color: var(--text-dim);
  min-width: 30px;
  text-transform: uppercase;
}
.day-task {
  flex: 1;
  outline: none;
  font-size: 13px;
  font-weight: 300;
  color: var(--text);
  padding: 3px 8px;
  margin: 0 -8px;
  border-radius: 4px;
  transition: background var(--t);
  line-height: 1.4;
}
.day-task:hover, .day-task:focus { background: var(--cream); }
.day-task:empty::before {
  content: attr(data-placeholder);
  color: var(--text-dim);
  font-size: 12px;
}
.day-row.completed .day-task {
  text-decoration: line-through;
  text-decoration-color: var(--text-dim);
  color: var(--text-dim);
}

/* ============= FOOTER ============= */
.footer {
  margin-top: 80px;
  padding-top: 32px;
  border-top: 1px solid rgba(196,98,45,0.10);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 20px;
  flex-wrap: wrap;
}
.footer-quote {
  font-size: 13px;
  font-weight: 300;
  color: var(--text-muted);
  letter-spacing: 0.04em;
  font-style: italic;
  flex: 1;
  min-width: 240px;
}
.footer-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.footer-btn {
  background: transparent;
  border: 1px solid var(--cream3);
  color: var(--text-muted);
  padding: 8px 18px;
  border-radius: 100px;
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  cursor: pointer;
  font-family: var(--sans);
  transition: all var(--t);
  white-space: nowrap;
}
.footer-btn:hover {
  background: var(--terra);
  border-color: var(--terra);
  color: var(--cream);
}
.footer-btn.subtle {
  border-color: rgba(230, 221, 210, 0.6);
  color: var(--text-dim);
}
.footer-btn.danger:hover {
  background: var(--text);
  border-color: var(--text);
}
.reset-btn {
  background: transparent;
  border: 1px solid var(--cream3);
  color: var(--text-muted);
  padding: 8px 18px;
  border-radius: 100px;
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  cursor: pointer;
  font-family: var(--sans);
  transition: all var(--t);
}
.reset-btn:hover { background: var(--terra); border-color: var(--terra); color: var(--cream); }

/* ============= ANIMATIONS ============= */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.28); }
  100% { transform: scale(1); }
}

/* ============= SAVE INDICATOR ============= */
.save-indicator {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--terra);
  color: var(--cream);
  padding: 9px 18px;
  border-radius: 100px;
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  opacity: 0;
  transform: translateY(20px);
  transition: all var(--t);
  pointer-events: none;
  box-shadow: var(--shadow-lg);
  z-index: 100;
}
.save-indicator.show { opacity: 1; transform: translateY(0); }

/* ============= RESPONSIVE ============= */
@media (max-width: 800px) {
  .container { padding: 36px 18px 60px; }
  .hero { padding: 56px 24px 48px; }
  .inspiration { grid-template-columns: 1fr; }
  .tri-top, .tri-meta, .month-meta { grid-template-columns: 1fr; grid-template-rows: auto; }
  .weeks-grid { grid-template-columns: 1fr; }
  .quarter-header { padding: 22px 22px; }
  .quarter-header-left { flex-direction: column; gap: 10px; align-items: flex-start; }
  .quarter-header h3 { font-size: 22px; }
  .quarter-body { padding: 22px 18px; }
  .month-header { padding: 18px 20px; }
  .month-body { padding: 20px 18px; }
  .area-hero-content { padding: 32px 26px; }
  .areas-grid { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
}

input[type="file"] { display: none; }
</style>
</head>
<body>

<div class="container">

  <!-- ============== HOME VIEW ============== -->
  <div class="view-home" id="viewHome">

    <section class="hero">
      <div class="hero-label">Planejamento Anual</div>
      <h1 class="hero-title">Vision <em>Board</em></h1>
      <div class="hero-year" contenteditable="true" data-key="period">Ano de 2026</div>
    </section>

    <div class="section-title">I · Inspiração & Afirmações</div>
    <div class="inspiration">
      <div class="image-board">
        <div class="panel-header">
          <h3 contenteditable="true" data-key="visionTitle">Vision Board Visual</h3>
          <button class="upload-btn" onclick="document.getElementById('imageInput').click()">+ Imagem</button>
          <input type="file" id="imageInput" accept="image/*" multiple>
        </div>
        <div class="image-grid" id="imageGrid"></div>
      </div>

      <div class="affirmations">
        <div class="panel-header">
          <h3 contenteditable="true" data-key="affirmationsTitle">Afirmações</h3>
        </div>
        <textarea class="affirmation-textarea" data-key="affirmations"></textarea>
      </div>
    </div>

    <div class="section-title">II · Áreas da Vida</div>
    <div class="areas-grid" id="areasGrid"></div>

  </div>

  <!-- ============== AREA VIEW ============== -->
  <div class="view-area" id="viewArea">
    <div class="back-bar">
      <button class="back-btn" onclick="goHome()">
        <span>←</span> Voltar
      </button>
      <div class="crumb">Áreas · <strong id="crumbArea">—</strong></div>
    </div>

    <section class="area-hero" id="areaHero">
      <div class="area-hero-bg" id="areaHeroBg"></div>
      <div class="area-hero-actions">
        <button class="cover-btn" id="areaHeroChange">Trocar capa</button>
        <button class="cover-btn" id="areaHeroRemove" style="display:none">Remover</button>
      </div>
      <div class="area-hero-content">
        <div class="area-hero-tag" id="areaHeroTag">Área da vida</div>
        <h2 contenteditable="true" id="areaHeroTitle">—</h2>
        <div class="area-hero-desc" id="areaHeroDesc" contenteditable="true" data-placeholder="Descreva sua visão para esta área da vida..."></div>
      </div>
    </section>

    <div class="section-title">Trimestres do Ano</div>
    <div id="quartersContainer"></div>
  </div>

  <div class="footer">
    <div class="footer-quote">"O sucesso é a soma de pequenos esforços, repetidos dia após dia."</div>
    <div class="footer-actions">
      <button class="footer-btn" onclick="exportData()">Exportar dados</button>
      <button class="footer-btn" onclick="document.getElementById('importInput').click()">Importar dados</button>
      <button class="footer-btn subtle" onclick="exportTemplate()">Exportar template</button>
      <button class="footer-btn danger" onclick="resetAll()">Limpar tudo</button>
    </div>
  </div>

</div>

<input type="file" id="hiddenAreaCoverInput" accept="image/*">
<input type="file" id="hiddenQuarterImageInput" accept="image/*">
<input type="file" id="importInput" accept="application/json,.json">

<div class="save-indicator" id="saveIndicator">Salvo</div>

<script>
const STORAGE_KEY = 'visionBoardData_v3_areas';

// ============= Defaults =============
const DEFAULT_AFFIRMATION = 'Eu confio no meu processo. Eu sou capaz de criar a vida que desejo. Coisas boas acontecem em mim e através de mim. Cada passo me aproxima da minha visão.';

const dayNames = ['Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb', 'Dom'];
const dayLabels = ['Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado', 'Domingo'];

const quarterDefaults = [
  { tag: 'Q1', name: 'Janeiro · Fevereiro · Março', months: ['Janeiro', 'Fevereiro', 'Março'] },
  { tag: 'Q2', name: 'Abril · Maio · Junho', months: ['Abril', 'Maio', 'Junho'] },
  { tag: 'Q3', name: 'Julho · Agosto · Setembro', months: ['Julho', 'Agosto', 'Setembro'] },
  { tag: 'Q4', name: 'Outubro · Novembro · Dezembro', months: ['Outubro', 'Novembro', 'Dezembro'] }
];

const areaDefaults = [
  { key: 'deus',          name: 'Deus' },
  { key: 'financeiro',    name: 'Financeiro' },
  { key: 'relacionamento',name: 'Relacionamento' },
  { key: 'profissional',  name: 'Profissional' },
  { key: 'saude',         name: 'Saúde' },
  { key: 'igreja',        name: 'Igreja' },
  { key: 'familia',       name: 'Família' },
  { key: 'material',      name: 'Material' }
];

// ============= Storage =============
let state = loadState();
let activeAreaKey = null;

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      // Ensure shape
      if (parsed && parsed.areas && parsed.areas.length === 8) return parsed;
    }
  } catch (e) {}
  return defaultState();
}

function defaultState() {
  return {
    period: 'Ano de 2026',
    visionTitle: 'Vision Board Visual',
    affirmationsTitle: 'Afirmações',
    affirmations: DEFAULT_AFFIRMATION,
    images: [],
    areas: areaDefaults.map(a => ({
      key: a.key,
      name: a.name,
      cover: null,
      desc: '',
      quarters: quarterDefaults.map(q => ({
        tag: q.tag,
        name: q.name,
        focus: '',
        objective: '',
        image: null,
        open: false,
        months: q.months.map(m => ({
          name: m,
          focus: '',
          objective: '',
          open: false,
          weeks: emptyWeeks()
        }))
      }))
    }))
  };
}

function emptyWeeks() {
  return [1,2,3,4].map(() => ({
    meta: '',
    desc: '',
    days: dayNames.map(() => ({ done: false, task: '' }))
  }));
}

let saveTimeout;
function saveState() {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      showSaved();
    } catch (e) { console.warn('Save failed', e); }
  }, 250);
}

function showSaved() {
  const el = document.getElementById('saveIndicator');
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 1100);
}

// ============= Helpers =============
function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function readImageFile(file, cb) {
  const reader = new FileReader();
  reader.onload = (ev) => cb(ev.target.result);
  reader.readAsDataURL(file);
}

function bindEditable(selector, key, isTextarea) {
  const el = document.querySelector(selector);
  if (!el) return;
  if (isTextarea) {
    el.value = state[key] || '';
    el.addEventListener('input', () => { state[key] = el.value; saveState(); });
  } else {
    el.textContent = state[key] || '';
    el.addEventListener('input', () => { state[key] = el.textContent; saveState(); });
  }
}

// ============= Vision Board Images =============
function renderImages() {
  const grid = document.getElementById('imageGrid');
  grid.innerHTML = '';
  state.images.forEach((src, i) => {
    const tile = document.createElement('div');
    tile.className = 'image-tile';
    tile.innerHTML = `<img src="${src}" alt="Vision"><button class="remove" title="Remover">×</button>`;
    tile.querySelector('.remove').onclick = () => {
      state.images.splice(i, 1);
      saveState();
      renderImages();
    };
    grid.appendChild(tile);
  });
}

document.getElementById('imageInput').addEventListener('change', (e) => {
  Array.from(e.target.files).forEach(file => {
    readImageFile(file, (data) => {
      state.images.push(data);
      saveState();
      renderImages();
    });
  });
  e.target.value = '';
});

// ============= Areas Grid (Home) =============
function renderAreas() {
  const grid = document.getElementById('areasGrid');
  grid.innerHTML = '';
  state.areas.forEach((area, ai) => {
    const card = document.createElement('div');
    card.className = 'area-card';
    card.innerHTML = `
      <div class="area-cover" data-area="${ai}">
        ${area.cover
          ? `<img src="${area.cover}" alt="${escapeHtml(area.name)}">`
          : `<div class="area-cover-placeholder">
               <div class="area-cover-icon">+</div>
               <div class="area-cover-text">Adicionar capa</div>
             </div>`
        }
        <div class="cover-actions">
          <button class="cover-btn" data-action="cover-change">${area.cover ? 'Trocar' : 'Adicionar'}</button>
          ${area.cover ? `<button class="cover-btn" data-action="cover-remove">Remover</button>` : ''}
        </div>
      </div>
      <div class="area-body">
        <div class="area-tag">Área 0${ai+1}</div>
        <div class="area-name-display">${escapeHtml(area.name)}</div>
        <div class="area-arrow">Abrir planejamento <span class="arrow">→</span></div>
      </div>
    `;

    // Click on card body opens the area
    card.querySelector('.area-body').addEventListener('click', () => openArea(area.key));

    // Click on cover (when no image) → upload; or click on cover (with image) avoids opening
    const coverEl = card.querySelector('.area-cover');
    coverEl.addEventListener('click', (e) => {
      // If clicked an action button, handle it
      const actionBtn = e.target.closest('[data-action]');
      if (actionBtn) {
        e.stopPropagation();
        const action = actionBtn.dataset.action;
        if (action === 'cover-change') {
          triggerCoverUpload(ai);
        } else if (action === 'cover-remove') {
          state.areas[ai].cover = null;
          saveState();
          renderAreas();
        }
        return;
      }
      // Click on placeholder → upload; click on image → open area
      if (!area.cover) {
        triggerCoverUpload(ai);
      } else {
        openArea(area.key);
      }
    });

    grid.appendChild(card);
  });
}

function triggerCoverUpload(areaIndex) {
  const inp = document.getElementById('hiddenAreaCoverInput');
  inp.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    readImageFile(file, (data) => {
      state.areas[areaIndex].cover = data;
      saveState();
      renderAreas();
    });
    inp.value = '';
  };
  inp.click();
}

// ============= Open / Close Area =============
function openArea(key) {
  activeAreaKey = key;
  document.body.classList.add('view-area-active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
  renderAreaView();
}

function goHome() {
  activeAreaKey = null;
  document.body.classList.remove('view-area-active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function getAreaIndex() {
  return state.areas.findIndex(a => a.key === activeAreaKey);
}

function renderAreaView() {
  const ai = getAreaIndex();
  if (ai < 0) return;
  const area = state.areas[ai];

  // Crumb
  document.getElementById('crumbArea').textContent = area.name;

  // Hero background
  const hero = document.getElementById('areaHero');
  const heroBg = document.getElementById('areaHeroBg');
  if (area.cover) {
    heroBg.innerHTML = `<img src="${area.cover}" alt="${escapeHtml(area.name)}">`;
    hero.classList.add('has-image');
  } else {
    heroBg.innerHTML = '';
    hero.classList.remove('has-image');
  }

  // Hero remove button
  const removeBtn = document.getElementById('areaHeroRemove');
  removeBtn.style.display = area.cover ? '' : 'none';

  // Hero title (editable)
  const titleEl = document.getElementById('areaHeroTitle');
  titleEl.textContent = area.name;
  titleEl.oninput = () => {
    state.areas[ai].name = titleEl.textContent;
    document.getElementById('crumbArea').textContent = titleEl.textContent;
    saveState();
  };

  // Hero description (editable)
  const descEl = document.getElementById('areaHeroDesc');
  descEl.textContent = area.desc || '';
  descEl.oninput = () => { state.areas[ai].desc = descEl.textContent; saveState(); };

  // Hero tag
  document.getElementById('areaHeroTag').textContent = `Área 0${ai+1}`;

  // Quarters
  renderQuarters(ai);
}

document.getElementById('areaHeroChange').addEventListener('click', () => {
  const ai = getAreaIndex();
  if (ai < 0) return;
  const inp = document.getElementById('hiddenAreaCoverInput');
  inp.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    readImageFile(file, (data) => {
      state.areas[ai].cover = data;
      saveState();
      renderAreaView();
      renderAreas();
    });
    inp.value = '';
  };
  inp.click();
});

document.getElementById('areaHeroRemove').addEventListener('click', () => {
  const ai = getAreaIndex();
  if (ai < 0) return;
  state.areas[ai].cover = null;
  saveState();
  renderAreaView();
  renderAreas();
});

// ============= Quarters / Months / Weeks / Days =============
function renderQuarters(ai) {
  const container = document.getElementById('quartersContainer');
  container.innerHTML = '';
  const area = state.areas[ai];

  area.quarters.forEach((q, qi) => {
    const sec = document.createElement('section');
    sec.className = 'quarter' + (q.open ? ' open' : '');
    sec.innerHTML = `
      <div class="quarter-header">
        <div class="quarter-header-left">
          <span class="quarter-tag">${q.tag}</span>
          <h3 contenteditable="true" data-placeholder="Nome do trimestre">${escapeHtml(q.name)}</h3>
        </div>
        <div class="chevron">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M3 5L7 9L11 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
      <div class="collapsible">
        <div class="collapsible-inner">
          <div class="quarter-body">
            <div class="tri-top">
              <div class="quarter-image ${q.image ? 'has-image' : ''}">
                ${q.image
                  ? `<img src="${q.image}" alt="Imagem do trimestre">
                     <div class="quarter-image-actions">
                       <button class="cover-btn" data-action="qimg-change">Trocar</button>
                       <button class="cover-btn" data-action="qimg-remove">Remover</button>
                     </div>`
                  : `<div class="quarter-image-placeholder">
                       <div class="icon">+</div>
                       <div class="text">Adicionar imagem<br>da meta trimestral</div>
                     </div>`
                }
              </div>
              <div class="tri-meta">
                <div class="meta-field">
                  <label>Foco do trimestre</label>
                  <div contenteditable="true" data-placeholder="Qual será o foco principal deste trimestre?" data-field="focus">${escapeHtml(q.focus)}</div>
                </div>
                <div class="meta-field">
                  <label>Objetivo principal</label>
                  <div contenteditable="true" data-placeholder="O que quero alcançar até o fim do trimestre?" data-field="objective">${escapeHtml(q.objective)}</div>
                </div>
              </div>
            </div>

            <div class="months-label">Meses do trimestre</div>
            <div class="months-stack"></div>
          </div>
        </div>
      </div>
    `;

    // Toggle
    const header = sec.querySelector('.quarter-header');
    header.addEventListener('click', (e) => {
      if (e.target.isContentEditable) return;
      q.open = !q.open;
      sec.classList.toggle('open', q.open);
      saveState();
    });

    // Editable name
    const nameEl = sec.querySelector('.quarter-header h3');
    nameEl.addEventListener('input', () => { state.areas[ai].quarters[qi].name = nameEl.textContent; saveState(); });
    nameEl.addEventListener('click', (e) => e.stopPropagation());

    // Quarter image upload / actions
    const qimg = sec.querySelector('.quarter-image');
    qimg.addEventListener('click', (e) => {
      const actionBtn = e.target.closest('[data-action]');
      if (actionBtn) {
        e.stopPropagation();
        const action = actionBtn.dataset.action;
        if (action === 'qimg-change') {
          triggerQuarterImageUpload(ai, qi);
        } else if (action === 'qimg-remove') {
          state.areas[ai].quarters[qi].image = null;
          saveState();
          renderQuarters(ai);
          // Re-open the same quarter to keep state
          const refreshed = document.querySelectorAll('.quarter')[qi];
          if (refreshed) refreshed.classList.add('open');
        }
        return;
      }
      if (!q.image) triggerQuarterImageUpload(ai, qi);
    });

    // Focus / objective
    sec.querySelectorAll('.tri-meta .meta-field [contenteditable]').forEach(el => {
      const field = el.dataset.field;
      el.addEventListener('input', () => { state.areas[ai].quarters[qi][field] = el.textContent; saveState(); });
    });

    // Months
    const monthsStack = sec.querySelector('.months-stack');
    q.months.forEach((m, mi) => {
      monthsStack.appendChild(buildMonth(ai, qi, mi, m));
    });

    container.appendChild(sec);
  });
}

function triggerQuarterImageUpload(ai, qi) {
  const inp = document.getElementById('hiddenQuarterImageInput');
  inp.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    readImageFile(file, (data) => {
      state.areas[ai].quarters[qi].image = data;
      state.areas[ai].quarters[qi].open = true;
      saveState();
      renderQuarters(ai);
    });
    inp.value = '';
  };
  inp.click();
}

function buildMonth(ai, qi, mi, month) {
  const sec = document.createElement('div');
  sec.className = 'month' + (month.open ? ' open' : '');
  sec.innerHTML = `
    <div class="month-header">
      <div class="month-header-left">
        <span class="month-tag">Mês 0${mi+1}</span>
        <h4 contenteditable="true" data-placeholder="Nome do mês">${escapeHtml(month.name)}</h4>
      </div>
      <div class="chevron">
        <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
          <path d="M3 5L7 9L11 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>
    <div class="collapsible">
      <div class="collapsible-inner">
        <div class="month-body">
          <div class="month-meta">
            <div class="meta-field">
              <label>Foco do mês</label>
              <div contenteditable="true" data-placeholder="Foco principal deste mês" data-field="focus">${escapeHtml(month.focus)}</div>
            </div>
            <div class="meta-field">
              <label>Objetivo principal</label>
              <div contenteditable="true" data-placeholder="O que quero alcançar este mês?" data-field="objective">${escapeHtml(month.objective)}</div>
            </div>
          </div>
          <div class="weeks-label">Planejamento Semanal</div>
          <div class="weeks-grid"></div>
        </div>
      </div>
    </div>
  `;

  const header = sec.querySelector('.month-header');
  header.addEventListener('click', (e) => {
    if (e.target.isContentEditable) return;
    month.open = !month.open;
    sec.classList.toggle('open', month.open);
    saveState();
  });

  const nameEl = sec.querySelector('h4');
  nameEl.addEventListener('input', () => { state.areas[ai].quarters[qi].months[mi].name = nameEl.textContent; saveState(); });
  nameEl.addEventListener('click', (e) => e.stopPropagation());

  sec.querySelectorAll('.month-meta .meta-field [contenteditable]').forEach(el => {
    const field = el.dataset.field;
    el.addEventListener('input', () => { state.areas[ai].quarters[qi].months[mi][field] = el.textContent; saveState(); });
  });

  const weeksGrid = sec.querySelector('.weeks-grid');
  month.weeks.forEach((w, wi) => {
    weeksGrid.appendChild(buildWeek(ai, qi, mi, wi, w));
  });

  return sec;
}

function buildWeek(ai, qi, mi, wi, week) {
  const card = document.createElement('div');
  card.className = 'week-card';
  const completed = week.days.filter(d => d.done).length;

  card.innerHTML = `
    <div class="week-header">
      <span class="week-num">Semana ${wi+1}</span>
      <span class="week-progress"><span class="prog-num">${completed}</span> / 7</span>
    </div>
    <div class="week-field">
      <label>Meta da semana</label>
      <div class="meta" contenteditable="true" data-placeholder="Qual a meta desta semana?">${escapeHtml(week.meta)}</div>
    </div>
    <div class="week-field">
      <label>Descrição</label>
      <div class="desc" contenteditable="true" data-placeholder="O que precisa ser feito?">${escapeHtml(week.desc)}</div>
    </div>
    <div class="checklist">
      <div class="checklist-title">Checklist diário</div>
      <div class="days"></div>
    </div>
  `;

  const metaEl = card.querySelector('.meta');
  const descEl = card.querySelector('.desc');
  metaEl.addEventListener('input', () => { state.areas[ai].quarters[qi].months[mi].weeks[wi].meta = metaEl.textContent; saveState(); });
  descEl.addEventListener('input', () => { state.areas[ai].quarters[qi].months[mi].weeks[wi].desc = descEl.textContent; saveState(); });

  const daysWrap = card.querySelector('.days');
  week.days.forEach((day, di) => {
    const row = document.createElement('div');
    row.className = 'day-row' + (day.done ? ' completed' : '');
    row.innerHTML = `
      <div class="checkbox ${day.done ? 'checked' : ''}" role="checkbox" aria-checked="${day.done}" tabindex="0"></div>
      <div class="day-name" title="${dayLabels[di]}">${dayNames[di]}</div>
      <div class="day-task" contenteditable="true" data-placeholder="Tarefa do dia...">${escapeHtml(day.task)}</div>
    `;
    const cb = row.querySelector('.checkbox');
    const taskEl = row.querySelector('.day-task');
    const progNum = card.querySelector('.prog-num');

    const toggle = () => {
      const newVal = !state.areas[ai].quarters[qi].months[mi].weeks[wi].days[di].done;
      state.areas[ai].quarters[qi].months[mi].weeks[wi].days[di].done = newVal;
      cb.classList.toggle('checked', newVal);
      cb.setAttribute('aria-checked', newVal);
      row.classList.toggle('completed', newVal);
      const c = state.areas[ai].quarters[qi].months[mi].weeks[wi].days.filter(d => d.done).length;
      progNum.textContent = c;
      saveState();
    };
    cb.addEventListener('click', toggle);
    cb.addEventListener('keydown', (e) => {
      if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); toggle(); }
    });
    taskEl.addEventListener('input', () => {
      state.areas[ai].quarters[qi].months[mi].weeks[wi].days[di].task = taskEl.textContent;
      saveState();
    });

    daysWrap.appendChild(row);
  });

  return card;
}

// ============= Reset =============
function resetAll() {
  if (!confirm('Tem certeza que deseja limpar todos os dados? Esta ação não pode ser desfeita.')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = loadState();
  goHome();
  initialize();
}

// ============= Export / Import =============
function downloadJSON(data, filename) {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 100);
}

function timestamp() {
  const d = new Date();
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function exportData() {
  const payload = {
    type: 'vision-board-data',
    version: 3,
    exportedAt: new Date().toISOString(),
    data: state
  };
  downloadJSON(payload, `vision-board-${timestamp()}.json`);
  showSaved();
}

function exportTemplate() {
  const payload = {
    type: 'vision-board-template',
    version: 3,
    exportedAt: new Date().toISOString(),
    data: defaultState()
  };
  downloadJSON(payload, `vision-board-template.json`);
  showSaved();
}

document.getElementById('importInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const parsed = JSON.parse(ev.target.result);
      const incoming = parsed && parsed.data ? parsed.data : parsed;
      if (!incoming || !incoming.areas || incoming.areas.length === 0) {
        alert('Arquivo inválido. Esperado um arquivo JSON do Vision Board.');
        return;
      }
      if (!confirm('Importar este arquivo vai substituir todos os dados atuais. Deseja continuar?')) {
        return;
      }
      state = incoming;
      // Ensure all required fields exist (for backward compat)
      if (state.affirmations == null) state.affirmations = DEFAULT_AFFIRMATION;
      if (!state.affirmationsTitle) state.affirmationsTitle = 'Afirmações';
      if (!state.visionTitle) state.visionTitle = 'Vision Board Visual';
      if (!state.images) state.images = [];
      saveState();
      goHome();
      initialize();
      alert('Dados importados com sucesso.');
    } catch (err) {
      alert('Não foi possível ler o arquivo: ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

// ============= Init =============
function initialize() {
  bindEditable('.hero-year', 'period');
  bindEditable('.affirmation-textarea', 'affirmations', true);
  bindEditable('.image-board .panel-header h3', 'visionTitle');
  bindEditable('.affirmations .panel-header h3', 'affirmationsTitle');
  renderImages();
  renderAreas();
}

initialize();
</script>
